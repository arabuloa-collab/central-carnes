<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - Central de Carnes</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      color: red;
    }

    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background: #222;
    }

    th, td {
      border: 1px solid #444;
      padding: 10px;
    }

    th {
      background: red;
    }

    button {
      padding: 10px;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Panel de Pedidos</h1>

  <button onclick="cargarPedidos()">Actualizar</button>

  <table>
    <thead>
      <tr>
        <th>Cliente</th>
        <th>Teléfono</th>
        <th>Dirección</th>
        <th>Producto</th>
        <th>Cantidad</th>
        <th>Descripción</th>
      </tr>
    </thead>
    <tbody id="tablaPedidos"></tbody>
  </table>

  <script>
    function cargarPedidos() {
      fetch("http://127.0.0.1:3000/api/pedidos")
        .then(res => res.json())
        .then(data => {
          const tabla = document.getElementById("tablaPedidos");
          tabla.innerHTML = "";

          data.forEach(p => {
            const fila = `
              <tr>
                <td>${p.cliente.nombre}</td>
                <td>${p.cliente.telefono}</td>
                <td>${p.cliente.direccion}</td>
                <td>${p.producto}</td>
                <td>${p.cantidad}</td>
                <td>${p.descripcion}</td>
              </tr>
            `;
            tabla.innerHTML += fila;
          });
        });
    }

    // Cargar automáticamente
    cargarPedidos();
  </script>

</body>
</html>
