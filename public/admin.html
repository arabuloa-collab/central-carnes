<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#login {
  text-align: center;
  margin-top: 60px;
}

input {
  padding: 12px;
  margin: 5px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-top: 5px;
  width: 250px;
  font-weight: bold;
}

#panel {
  display: none;
  padding: 10px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-out { background: orange; color: black; }

#filtro {
  width: 100%;
  margin: 10px 0;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 0 10px #000;
}

.pendiente { color: #facc15; font-weight: bold; }
.entregado { color: #22c55e; font-weight: bold; }

.btn-wsp { background: #22c55e; color: black; }
.btn-del { background: #dc2626; color: white; }
.btn-state { background: #3b82f6; color: white; }
.btn-copy { background: #64748b; color: white; }
.btn-export { background: #0ea5e9; color: white; }

.card button {
  width: 100%;
  margin-top: 5px;
}

.items-box {
  background: rgba(15, 23, 42, 0.6);
  border-radius: 10px;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <img src="logo.png" style="height:50px; margin-bottom:5px;">
    <span>📦 Panel de Pedidos</span>
  </div>
</header>

<div id="login">
  <input id="user" type="text" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Ingresar</button>
</div>

<div id="panel">

<div class="topbar">
  <div>👤 <span id="usuario"></span> · <span id="rol"></span></div>
  <button class="btn-out" onclick="logout()">Salir</button>
</div>

<div id="dashboard" style="display:flex; gap:10px; margin:10px 0;">

  <div class="card" style="flex:1; text-align:center;">
    <div>Total</div>
    <h2 id="total">0</h2>
  </div>

  <div class="card" style="flex:1; text-align:center;">
    <div>Pendientes</div>
    <h2 id="pendientes">0</h2>
  </div>

  <div class="card" style="flex:1; text-align:center;">
    <div>Entregados</div>
    <h2 id="entregados">0</h2>
  </div>

</div>

<button class="btn-export" onclick="exportarCSV()">Exportar a Excel</button>

<input id="filtro" placeholder="Buscar cliente o número de pedido...">

<div id="lista"></div>

</div>

<script>
const TELEFONO = "5491125061324";

const loginDiv = document.getElementById("login");
const panel = document.getElementById("panel");
const usuario = document.getElementById("usuario");
const rol = document.getElementById("rol");
const lista = document.getElementById("lista");
const filtro = document.getElementById("filtro");

let ultimoPedidoNumeroVisto = Number(localStorage.getItem("ultimoPedidoNumeroVisto") || 0);
let intervaloPedidos = null;

function getSesion() {
  try {
    return JSON.parse(localStorage.getItem("sesion")) || null;
  } catch {
    return null;
  }
}

function playNuevoPedidoSound() {
  try {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
    oscillator.frequency.setValueAtTime(660, audioCtx.currentTime + 0.12);

    gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 0.02);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();
    oscillator.stop(audioCtx.currentTime + 0.36);
  } catch (e) {}
}

function getTotalPedido(items) {
  const precios = {
    "AGUJA RIOPLATENSE": 6500,
    "ALITAS CAMELIAS": 4200,
    "ALITAS SOYCHU": 4300,
    "ASADO FORTUNA": 9800,
    "BIFE DE CHORIZO": 12500,
    "CUADRIL": 11800,
    "LOMO": 14900,
    "VACIO": 11000
  };

  return (items || []).reduce((acc, item) => {
    const precio = Number(precios[item.producto] || 0);
    const cantidad = Number(item.cantidad || 0);
    return acc + (precio * cantidad);
  }, 0);
}

function formatMoney(value) {
  return Number(value || 0).toLocaleString("es-AR");
}

function getSesionHeaders() {
  const sesion = getSesion();
  return {
    "X-Role": sesion?.role || "",
    "X-User": sesion?.user || ""
  };
}

function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  if (!user || !pass) {
    alert("Completa los datos");
    return;
  }

  fetch("/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user, pass })
  })
  .then(res => {
    if (!res.ok) throw new Error();
    return res.json();
  })
  .then(data => {
    localStorage.setItem("sesion", JSON.stringify({
      user: data.user,
      role: data.role
    }));
    mostrar();
  })
  .catch(() => alert("Usuario o contraseña incorrectos"));
}

function logout() {
  localStorage.removeItem("sesion");
  if (intervaloPedidos) clearInterval(intervaloPedidos);
  location.reload();
}

function mostrar() {
  const sesion = getSesion();
  if (!sesion) return;

  loginDiv.style.display = "none";
  panel.style.display = "block";
  usuario.innerText = sesion.user;
  rol.innerText = sesion.role;

  cargar(true);

  if (intervaloPedidos) clearInterval(intervaloPedidos);
  intervaloPedidos = setInterval(() => cargar(false), 10000);
}

if (getSesion()) {
  mostrar();
}

function cargar(esPrimeraCarga = false) {
  fetch("/api/pedidos/grouped")
  .then(r => r.json())
  .then(data => {
    lista.innerHTML = "";

    let total = data.length;
    let pendientes = 0;
    let entregados = 0;

    const f = filtro.value.toLowerCase().trim();
    const sesion = getSesion();

    const maxNumeroActual = data.reduce((acc, p) => {
      const n = Number(p.pedidoNumero || 0);
      return n > acc ? n : acc;
    }, 0);

    if (!esPrimeraCarga && maxNumeroActual > ultimoPedidoNumeroVisto) {
      playNuevoPedidoSound();
    }

    if (maxNumeroActual > ultimoPedidoNumeroVisto) {
      ultimoPedidoNumeroVisto = maxNumeroActual;
      localStorage.setItem("ultimoPedidoNumeroVisto", String(ultimoPedidoNumeroVisto));
    }

    data
      .slice()
      .sort((a, b) => Number(b.pedidoNumero) - Number(a.pedidoNumero))
      .forEach((p) => {
        const estado = p.estado || "pendiente";

        if (estado === "pendiente" || estado === "en preparación") pendientes++;
        if (estado === "entregado") entregados++;

        const nombre = p.cliente?.nombre || "Sin nombre";
        const numero = String(p.pedidoNumero || "");

        const coincide =
          !f ||
          nombre.toLowerCase().includes(f) ||
          numero.toLowerCase().includes(f);

        if (!coincide) return;

        const clase = estado === "entregado" ? "entregado" : "pendiente";
        const puedeEliminar = sesion?.role === "admin";
        const totalPedido = getTotalPedido(p.items);

        const itemsHTML = (p.items || []).map(item => `
          <div>
            🥩 ${item.producto || "-"}<br>
            ⚖️ ${item.cantidad || "-"} kg
          </div>
        `).join("<hr style='border-color: rgba(255,255,255,0.08);'>");

        const msgItems = (p.items || []).map(item =>
          `🥩 ${item.producto || "-"} - ${item.cantidad || "-"} kg`
        ).join("%0A");

        const textoCopiar =
`Pedido #${p.pedidoNumero || "-"}
Cliente: ${p.cliente?.nombre || "-"}
Teléfono: ${p.cliente?.telefono || "-"}
Dirección: ${p.cliente?.direccion || "-"}
Fecha: ${p.fecha || "-"}
Actualizado: ${p.actualizado || "-"}
Estado: ${p.estado || "-"}
${(p.items || []).map(item => `- ${item.producto || "-"} (${item.cantidad || "-"} kg)`).join("\n")}
Total estimado: $${formatMoney(totalPedido)}`;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <b>${nombre}</b><br>
          📞 ${p.cliente?.telefono || "-"}<br>
          📍 ${p.cliente?.direccion || "-"}<br>
          📅 ${p.fecha || "-"}<br>
          🕒 Actualizado: ${p.actualizado || "-"}<br>
          #️⃣ Pedido: ${p.pedidoNumero || "-"}<br>
          💲 Total estimado: $${formatMoney(totalPedido)}<br>
          📦 Estado: <span class="${clase}">${estado}</span><br><br>

          <div class="items-box">
            ${itemsHTML}
          </div>

          <button class="btn-wsp" onclick="wsp('${p.cliente?.nombre || "-"}','${p.cliente?.telefono || "-"}','${p.cliente?.direccion || "-"}','${p.fecha || "-"}','${p.pedidoNumero || "-"}', \`${msgItems}\`, '${formatMoney(totalPedido)}', '${p.actualizado || "-"}', '${p.estado || "-"}')">WhatsApp</button>
          <button class="btn-copy" onclick="copiarPedido(\`${textoCopiar}\`)">Copiar pedido</button>
          <button class="btn-state" onclick="cambiar(${p.pedidoNumero})">Cambiar estado</button>
          ${puedeEliminar ? `<button class="btn-del" onclick="delPedido(${p.pedidoNumero})">Eliminar</button>` : ""}
        `;

        lista.appendChild(div);
      });

    document.getElementById("total").innerText = total;
    document.getElementById("pendientes").innerText = pendientes;
    document.getElementById("entregados").innerText = entregados;
  });
}

function copiarPedido(texto) {
  navigator.clipboard.writeText(texto)
    .then(() => alert("Pedido copiado"))
    .catch(() => alert("No se pudo copiar"));
}

function exportarCSV() {
  window.open("/api/pedidos/export.csv", "_blank");
}

function delPedido(pedidoNumero) {
  fetch("/api/pedidos/grouped/" + pedidoNumero, {
    method: "DELETE",
    headers: getSesionHeaders()
  })
  .then(async res => {
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || "No se pudo eliminar");
    }
    return res.json();
  })
  .then(() => cargar(true))
  .catch(err => alert(err.message));
}

function cambiar(pedidoNumero) {
  const opciones = ["pendiente", "en preparación", "entregado", "cancelado"];

  let estado = prompt(
`Estados:
- pendiente
- en preparación
- entregado
- cancelado

Escribí el nuevo estado:`);

  if (!estado) return;

  estado = estado.toLowerCase();

  if (!opciones.includes(estado)) {
    alert("Estado inválido");
    return;
  }

  fetch("/api/pedidos/grouped/" + pedidoNumero, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      ...getSesionHeaders()
    },
    body: JSON.stringify({ estado })
  })
  .then(async res => {
    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      throw new Error(data.error || "No se pudo cambiar el estado");
    }
    return res.json();
  })
  .then(() => cargar(true))
  .catch(err => alert(err.message));
}

function wsp(nombre, telefono, direccion, fecha, pedidoNumero, items, total, actualizado, estado) {
  const msg =
    `🛒 *PEDIDO*%0A` +
    `👤 ${nombre}%0A` +
    `📞 ${telefono}%0A` +
    `📍 ${direccion}%0A` +
    `${items}%0A` +
    `💲 Total estimado: $${total}%0A` +
    `📅 ${fecha}%0A` +
    `🕒 Actualizado: ${actualizado}%0A` +
    `📦 Estado: ${estado}%0A` +
    `#️⃣ Pedido: ${pedidoNumero}`;

  window.open(`https://wa.me/${TELEFONO}?text=${msg}`, "_blank");
}

filtro.addEventListener("input", () => cargar(true));
</script>

</body>
</html>
