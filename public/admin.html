<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
</head>
<body style="background:#111;color:white;font-family:Arial;">

<h1>Panel Admin</h1>

<input type="text" id="filtro" placeholder="Buscar cliente">

<div id="lista"></div>

<script>
function cargar() {
  fetch("/api/pedidos")
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      const filtro = document.getElementById("filtro").value.toLowerCase();

      data.forEach((p, i) => {
        if (!p.cliente.nombre.toLowerCase().includes(filtro)) return;

        const div = document.createElement("div");
        div.innerHTML = `
          <p>
          ${p.cliente.nombre} - ${p.producto} - ${p.cantidad} <br>
          📅 ${p.fecha || "sin fecha"} <br>
          <button onclick="eliminar(${i})">Eliminar</button>
          </p>
        `;
        lista.appendChild(div);
      });
    });
}

function eliminar(i) {
  fetch("/api/pedidos/" + i, { method: "DELETE" })
    .then(() => cargar());
}

document.getElementById("filtro").addEventListener("input", cargar);

cargar();
</script>

</body>
</html>
