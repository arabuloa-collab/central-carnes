<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      background: red;
      padding: 10px;
    }

    input {
      padding: 10px;
      width: 300px;
      margin: 10px;
    }

    .card {
      background: #222;
      margin: 10px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>

<h1>Panel de Pedidos</h1>

<input type="text" id="filtro" placeholder="Buscar cliente...">

<div id="lista"></div>

<script>
function cargar() {
  fetch("/api/pedidos")
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      const filtro = document.getElementById("filtro").value.toLowerCase();

      data.forEach((p, i) => {
        if (!p.cliente || !p.cliente.nombre) return;

        if (!p.cliente.nombre.toLowerCase().includes(filtro)) return;

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <strong>${p.cliente.nombre}</strong><br>
          📞 ${p.cliente.telefono}<br>
          📍 ${p.cliente.direccion}<br>
          🥩 ${p.producto}<br>
          ⚖️ ${p.cantidad}<br>
          📅 ${p.fecha || "sin fecha"}<br><br>
          <button onclick="eliminar(${i})">Eliminar</button>
        `;

        lista.appendChild(div);
      });
    });
}

function eliminar(i) {
  fetch("/api/pedidos/" + i, {
    method: "DELETE"
  })
  .then(() => cargar());
}

document.getElementById("filtro").addEventListener("input", cargar);

cargar();
</script>

</body>
</html>
