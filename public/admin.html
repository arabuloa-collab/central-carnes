<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  margin: 0;
}

header {
  background: red;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

#buscador {
  width: 90%;
  max-width: 400px;
  margin: 15px auto;
  display: block;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#lista {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.pedido {
  background: #222;
  margin: 10px;
  padding: 15px;
  width: 280px;
  border-radius: 10px;
}

button {
  background: red;
  border: none;
  padding: 8px;
  color: white;
  width: 100%;
  margin-top: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Panel de Pedidos</header>

<input id="buscador" placeholder="🔍 Buscar cliente...">

<div id="lista"></div>

<script>

let pedidosGlobal = [];

async function cargar() {
  const res = await fetch("/api/pedidos");
  pedidosGlobal = await res.json();

  mostrar(pedidosGlobal);
}

function mostrar(data) {
  lista.innerHTML = "";

  data.slice().reverse().forEach(p => {
    lista.innerHTML += `
    <div class="pedido">
      <small>${p.fecha || "-"}</small><br>

      <b>${p.cliente?.nombre || "-"}</b><br>
      ${p.cliente?.telefono || "-"}<br>

      <hr>

      ${p.producto || "-"} - ${p.cantidad || "-"}

      <button onclick="eliminar(${p.id})">Eliminar</button>
    </div>
    `;
  });
}

function eliminar(id) {
  fetch("/api/pedidos/" + id, { method: "DELETE" })
  .then(() => cargar());
}

// 🔍 FILTRO EN TIEMPO REAL
document.getElementById("buscador").addEventListener("input", function() {
  const texto = this.value.toLowerCase();

  const filtrados = pedidosGlobal.filter(p =>
    p.cliente?.nombre?.toLowerCase().includes(texto)
  );

  mostrar(filtrados);
});

// 🔄 actualizar
setInterval(cargar, 5000);
cargar();

</script>

</body>
</html>
