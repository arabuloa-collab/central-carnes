<head>
<meta charset="UTF-8">
<title>Admin</title>

<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
h1 { background:red; padding:10px; }

input { padding:10px; margin:5px; width:250px; }

.card {
  background:#222;
  margin:10px auto;
  padding:15px;
  width:300px;
  border-radius:10px;
}

button {
  padding:10px;
  margin-top:5px;
  width:100%;
  border:none;
  cursor:pointer;
}

.btn-wsp { background:green; color:white; }
.btn-del { background:red; color:white; }
.btn-out { background:orange; color:black; }

#panel { display:none; }
</style>
</head>

<body>

<h1>Panel Admin</h1>

<div id="login">
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Ingresar</button>
</div>

<div id="panel">

<button class="btn-out" onclick="logout()">Cerrar sesión</button>

<input id="filtro" placeholder="Buscar cliente...">

<div id="lista"></div>

</div>

<script>
const TELEFONO = "5491125061324";

function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  fetch("/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user, pass })
  })
  .then(res => {
    if (!res.ok) throw new Error();
    return res.json();
  })
  .then(data => {
    localStorage.setItem("login", data.user);
    mostrar();
  })
  .catch(() => alert("Login incorrecto"));
}

function logout() {
  localStorage.removeItem("login");
  location.reload();
}

function mostrar() {
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";
  cargar();
}

if (localStorage.getItem("login")) {
  mostrar();
}

function cargar() {
  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    const lista=document.getElementById("lista");
    lista.innerHTML="";

    const filtro=document.getElementById("filtro").value.toLowerCase();

    data.forEach((p,i)=>{
      const nombre=p.cliente?.nombre||"Sin nombre";
      if(!nombre.toLowerCase().includes(filtro)) return;

      const estado = p.estado || "pendiente";

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <b>${nombre}</b><br>
        📞 ${p.cliente?.telefono||"-"}<br>
        📍 ${p.cliente?.direccion||"-"}<br>
        🥩 ${p.producto||"-"}<br>
        ⚖️ ${p.cantidad||"-"}<br>
        📅 ${p.fecha||"-"}<br>
        📦 Estado: <b>${estado}</b><br><br>

        <button class="btn-wsp" onclick="wsp(${i})">WhatsApp</button>
        <button onclick="cambiar(${i})">Cambiar estado</button>
        <button class="btn-del" onclick="del(${i})">Eliminar</button>
      `;

      lista.appendChild(div);
    });
  });
}

function del(i){
  fetch("/api/pedidos/"+i,{method:"DELETE"}).then(()=>cargar());
}

function cambiar(i){
  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    const actual = data[i].estado || "pendiente";
    const nuevo = actual === "pendiente" ? "entregado" : "pendiente";

    fetch("/api/pedidos/"+i,{
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ estado:nuevo })
    })
    .then(()=>cargar());
  });
}

function wsp(i){
  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    const p=data[i];

    const msg=`Pedido%0A${p.cliente?.nombre}%0A${p.producto}%0A${p.cantidad}`;
    window.open(`https://wa.me/${TELEFONO}?text=${msg}`);
  });
}

document.getElementById("filtro").addEventListener("input",cargar);
</script>

</body>
</html>
