<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin PRO</title>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#login {
  text-align: center;
  margin-top: 60px;
}

input {
  padding: 12px;
  margin: 5px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  margin-top: 5px;
  width: 250px;
  font-weight: bold;
}

#panel {
  display: none;
  padding: 10px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.btn-out { background: orange; color: black; }

#filtro {
  width: 100%;
  margin: 10px 0;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 0 10px #000;
}

.pendiente { color: #facc15; font-weight: bold; }
.entregado { color: #22c55e; font-weight: bold; }

.btn-wsp { background: #22c55e; color: black; }
.btn-del { background: #dc2626; color: white; }
.btn-state { background: #3b82f6; color: white; }

.card button {
  width: 100%;
  margin-top: 5px;
}
</style>
</head>

<body>

<header>📦 Panel de Pedidos</header>

<!-- LOGIN -->
<div id="login">
  <input id="user" type="text" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Ingresar</button>
</div>

<!-- PANEL -->
<div id="panel">

<div class="topbar">
  <div>👤 <span id="usuario"></span></div>
  <button class="btn-out" onclick="logout()">Salir</button>
</div>

<!-- 🔥 DASHBOARD -->
<div id="dashboard" style="display:flex; gap:10px; margin:10px 0;">

  <div class="card" style="flex:1; text-align:center;">
    <div>Total</div>
    <h2 id="total">0</h2>
  </div>

  <div class="card" style="flex:1; text-align:center;">
    <div>Pendientes</div>
    <h2 id="pendientes">0</h2>
  </div>

  <div class="card" style="flex:1; text-align:center;">
    <div>Entregados</div>
    <h2 id="entregados">0</h2>
  </div>

</div>

<input id="filtro" placeholder="Buscar cliente...">

<div id="lista"></div>

</div>

<script>
const TELEFONO = "5491125061324";

// ELEMENTOS
const loginDiv = document.getElementById("login");
const panel = document.getElementById("panel");
const usuario = document.getElementById("usuario");
const lista = document.getElementById("lista");
const filtro = document.getElementById("filtro");

// LOGIN
function login() {
  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();

  if (!user || !pass) {
    alert("Completa los datos");
    return;
  }

  fetch("/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ user, pass })
  })
  .then(res => {
    if (!res.ok) throw new Error();
    return res.json();
  })
  .then(data => {
    localStorage.setItem("login", data.user);
    mostrar();
  })
  .catch(() => alert("Usuario o contraseña incorrectos"));
}

// LOGOUT
function logout() {
  localStorage.removeItem("login");
  location.reload();
}

// MOSTRAR PANEL
function mostrar() {
  loginDiv.style.display = "none";
  panel.style.display = "block";
  usuario.innerText = localStorage.getItem("login");
  cargar();
}

// SESION
if (localStorage.getItem("login")) {
  mostrar();
}

// CARGAR
function cargar() {
  fetch("/api/pedidos")
  .then(r => r.json())
  .then(data => {

    lista.innerHTML = "";

    let total = data.length;
    let pendientes = 0;
    let entregados = 0;

    const f = filtro.value.toLowerCase();

    data.forEach((p, i) => {

      const estado = p.estado || "pendiente";

      if (estado === "pendiente") pendientes++;
      if (estado === "entregado") entregados++;

      const nombre = p.cliente?.nombre || "Sin nombre";
      if (!nombre.toLowerCase().includes(f)) return;

      const clase = estado === "entregado" ? "entregado" : "pendiente";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <b>${nombre}</b><br>
        📞 ${p.cliente?.telefono || "-"}<br>
        📍 ${p.cliente?.direccion || "-"}<br>
        🥩 ${p.producto || "-"}<br>
        ⚖️ ${p.cantidad || "-"}<br>
        📅 ${p.fecha || "-"}<br>
        📦 Estado: <span class="${clase}">${estado}</span><br><br>

        <button class="btn-wsp" onclick="wsp(${i})">WhatsApp</button>
        <button class="btn-state" onclick="cambiar(${i})">Cambiar estado</button>
        <button class="btn-del" onclick="del(${i})">Eliminar</button>
      `;

      lista.appendChild(div);
    });

    document.getElementById("total").innerText = total;
    document.getElementById("pendientes").innerText = pendientes;
    document.getElementById("entregados").innerText = entregados;
  });
}

// ELIMINAR
function del(i) {
  fetch("/api/pedidos/" + i, { method: "DELETE" })
    .then(() => cargar());
}

// CAMBIAR ESTADO
function cambiar(i) {
  fetch("/api/pedidos")
  .then(r => r.json())
  .then(data => {
    const actual = data[i].estado || "pendiente";
    const nuevo = actual === "pendiente" ? "entregado" : "pendiente";

    fetch("/api/pedidos/" + i, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ estado: nuevo })
    })
    .then(() => cargar());
  });
}

// WHATSAPP
function wsp(i) {
  fetch("/api/pedidos")
  .then(r => r.json())
  .then(data => {
    const p = data[i];

    const msg = `Pedido%0A${p.cliente?.nombre}%0A${p.producto}%0A${p.cantidad}`;
    window.open(`https://wa.me/${TELEFONO}?text=${msg}`);
  });
}

filtro.addEventListener("input", cargar);
</script>

</body>
</html>
