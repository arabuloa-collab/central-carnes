<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      background: red;
      padding: 10px;
    }

    input {
      padding: 10px;
      width: 250px;
      margin: 5px;
    }

    .card {
      background: #222;
      margin: 10px auto;
      padding: 15px;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 5px;
      width: 100%;
      border: none;
      cursor: pointer;
    }

    .btn-eliminar { background: red; color: white; }
    .btn-wsp { background: green; color: white; }

    #panel { display: none; }
  </style>
</head>
<body>

<h1>Panel Admin</h1>

<!-- 🔐 LOGIN -->
<div id="login">
  <input type="text" id="user" placeholder="Usuario"><br>
  <input type="password" id="pass" placeholder="Contraseña"><br>
  <button onclick="login()">Ingresar</button>
</div>

<!-- 🔥 PANEL -->
<div id="panel">

  <input type="text" id="filtro" placeholder="Buscar cliente...">

  <div id="lista"></div>

</div>

<script>
const TELEFONO = "5491125061324";

// 🔐 LOGIN
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if (user === "admin" && pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("panel").style.display = "block";
    cargar();
  } else {
    alert("Datos incorrectos");
  }
}

// 🔄 CARGAR PEDIDOS
function cargar() {
  fetch("/api/pedidos")
    .then(res => res.json())
    .then(data => {
      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      const filtro = document.getElementById("filtro").value.toLowerCase();

      data.forEach((p, i) => {
        const nombre = p.cliente?.nombre || "Sin nombre";

        if (!nombre.toLowerCase().includes(filtro)) return;

        const telefono = p.cliente?.telefono || "-";
        const direccion = p.cliente?.direccion || "-";
        const producto = p.producto || "-";
        const cantidad = p.cantidad || "-";
        const fecha = p.fecha || "sin fecha";

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
          <strong>${nombre}</strong><br>
          📞 ${telefono}<br>
          📍 ${direccion}<br>
          🥩 ${producto}<br>
          ⚖️ ${cantidad}<br>
          📅 ${fecha}<br><br>

          <button class="btn-wsp" onclick="enviarWhatsApp(${i})">
            WhatsApp
          </button>

          <button class="btn-eliminar" onclick="eliminar(${i})">
            Eliminar
          </button>
        `;

        lista.appendChild(div);
      });
    });
}

// 🗑 ELIMINAR
function eliminar(i) {
  fetch("/api/pedidos/" + i, {
    method: "DELETE"
  })
  .then(() => cargar());
}

// 📲 WHATSAPP
function enviarWhatsApp(i) {
  fetch("/api/pedidos")
    .then(res => res.json())
    .then(data => {
      const p = data[i];

      const mensaje = `🛒 *Pedido*%0A
👤 ${p.cliente?.nombre}%0A
📞 ${p.cliente?.telefono}%0A
📍 ${p.cliente?.direccion}%0A
🥩 ${p.producto}%0A
⚖️ ${p.cantidad}%0A
📅 ${p.fecha}`;

      window.open(`https://wa.me/${TELEFONO}?text=${mensaje}`, "_blank");
    });
}

// 🔍 FILTRO
document.getElementById("filtro").addEventListener("input", cargar);
</script>

</body>
</html>
