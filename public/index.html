<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
}

input, select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  width: 260px;
}

.btn-repetir {
  background: #3b82f6;
  color: white;
  margin-top: 8px;
}

/* estados */
.estado {
  padding: 5px;
  border-radius: 6px;
  font-weight: bold;
  display: inline-block;
  margin-top: 5px;
}

.pendiente {
  background: #facc15;
  color: black;
}

.entregado {
  background: #22c55e;
  color: black;
}

/* 🔥 ANIMACIONES */
.fade-out {
  animation: fadeOut 0.5s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(0.95);
  }
}

#exito {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  justify-content: center;
  align-items: center;
}

.card-exito {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px #000;
  animation: zoomIn 0.4s ease;
}

@keyframes zoomIn {
  from {
    transform: scale(0.5);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.check {
  font-size: 80px;
  color: #22c55e;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <img src="logo.png" style="height:50px;">
    <div><b>Central Carnes</b></div>
  </div>
</header>

<!-- FORM -->
<div id="formulario">
<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>

<input id="cantidad" placeholder="Cantidad (kg)">

<button onclick="enviar()">Enviar Pedido</button>
<button onclick="verHistorial()">Ver mis pedidos</button>
</div>

<!-- 🔥 EXITO ANIMADO -->
<div id="exito">
  <div class="card-exito">
    <div class="check">✅</div>
    <h2>Pedido enviado</h2>
    <p>Nos comunicamos a la brevedad</p>
    <button onclick="volver()">Hacer otro pedido</button>
  </div>
</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
  <h2>📦 Mis pedidos</h2>
  <div id="lista"></div>
  <button onclick="volver()">Volver</button>
</div>

<script>

// AUTO COMPLETAR
window.onload = function() {
  document.getElementById("nombre").value = localStorage.getItem("nombre") || "";
  document.getElementById("telefono").value = localStorage.getItem("telefono") || "";
  document.getElementById("direccion").value = localStorage.getItem("direccion") || "";
};

function cargarProductos() {
  fetch("/api/productos")
    .then(r => r.json())
    .then(data => {
      const select = document.getElementById("producto");
      select.innerHTML = "";

      data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.nombre;
        option.textContent = p.nombre;
        select.appendChild(option);
      });
    });
}

function enviar() {
  const nombre = document.getElementById("nombre").value;
  const telefono = document.getElementById("telefono").value;
  const direccion = document.getElementById("direccion").value;

  localStorage.setItem("nombre", nombre);
  localStorage.setItem("telefono", telefono);
  localStorage.setItem("direccion", direccion);

  const pedido = {
    cliente: { nombre, telefono, direccion },
    producto: document.getElementById("producto").value,
    cantidad: document.getElementById("cantidad").value
  };

  const form = document.getElementById("formulario");

  fetch("/api/pedidos", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(pedido)
  })
  .then(() => {
    // 🔥 animación
    form.classList.add("fade-out");

    setTimeout(() => {
      form.style.display = "none";
      document.getElementById("exito").style.display = "flex";
    }, 400);
  });
}

function verHistorial() {
  const tel = document.getElementById("telefono").value || localStorage.getItem("telefono");

  if (!tel) {
    alert("Ingresá tu teléfono");
    return;
  }

  fetch("/api/pedidos")
  .then(r => r.json())
  .then(data => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const pedidos = data.filter(p => p.cliente?.telefono == tel);

    pedidos.reverse().forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      const estado = p.estado || "pendiente";
      const clase = estado === "entregado" ? "entregado" : "pendiente";

      div.innerHTML = `
        🥩 ${p.producto}<br>
        ⚖️ ${p.cantidad}<br>
        📅 ${p.fecha || "-"}<br>

        <div class="estado ${clase}">
          ${estado.toUpperCase()}
        </div>

        <button class="btn-repetir" onclick='repetir(${JSON.stringify(p)})'>
          🔁 Repetir pedido
        </button>
      `;

      lista.appendChild(div);
    });

    document.getElementById("formulario").style.display = "none";
    document.getElementById("historial").style.display = "block";
  });
}

function repetir(p) {
  document.getElementById("nombre").value = p.cliente?.nombre || "";
  document.getElementById("telefono").value = p.cliente?.telefono || "";
  document.getElementById("direccion").value = p.cliente?.direccion || "";
  document.getElementById("producto").value = p.producto || "";
  document.getElementById("cantidad").value = p.cantidad || "";

  document.getElementById("historial").style.display = "none";
  document.getElementById("formulario").style.display = "block";
}

function volver() {
  document.getElementById("exito").style.display = "none";
  document.getElementById("historial").style.display = "none";

  const form = document.getElementById("formulario");
  form.style.display = "block";
  form.classList.remove("fade-out");
}

cargarProductos();

</script>

</body>
</html>
