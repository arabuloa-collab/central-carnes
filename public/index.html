<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
}

.promos { padding: 10px; }

.promo-card {
  background: #dc2626;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
}

.container {
  max-width: 400px;
  margin: 20px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #0f172a;
  color: white;
}

button {
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 5px;
}

.btn-main { background: #22c55e; color: black; }
.btn-sec { background: #334155; color: white; }
.btn-wsp { background: #25D366; color: black; }
.btn-qr { background: #3b82f6; color: white; }

.estado {
  padding: 5px;
  border-radius: 6px;
  font-weight: bold;
}

.pendiente { background: #facc15; color: black; }
.entregado { background: #22c55e; color: black; }

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

#comboBox {
  display: none;
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}

/* EXITO */
#exito {
  display: none;
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0f172a;
  justify-content:center;
  align-items:center;
}

.card-exito {
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
}

.check { font-size:70px; color:#22c55e; }

/* QR */
#qrModal {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000a;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" style="height:50px;"><br>
  <b>Central Carnes</b>
</header>

<!-- PROMOS + COMBOS -->
<div class="promos">

<div class="promo-card" onclick="aplicarPromo('ASADO FORTUNA','2')">
🔥 2kg Asado
</div>

<div class="promo-card" onclick="combo1()">
🥩 Combo Parrillero (2 Asado + 1 Vacío)
</div>

</div>

<!-- FORM -->
<div id="formulario" class="container">

<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>
<input id="cantidad" placeholder="Cantidad (kg)">

<div id="comboBox"></div>

<button class="btn-main" onclick="enviar()">Enviar Pedido</button>
<button class="btn-sec" onclick="verHistorial()">Ver mis pedidos</button>
<button class="btn-wsp" onclick="compartir()">Compartir WhatsApp</button>
<button class="btn-qr" onclick="verQR()">Ver QR</button>

</div>

<!-- HISTORIAL -->
<div id="historial" class="container" style="display:none;">
  <h2>📦 Mis pedidos</h2>
  <div id="lista"></div>
  <button onclick="volver()">Volver</button>
</div>

<!-- EXITO -->
<div id="exito">
  <div class="card-exito">
    <div class="check">✅</div>
    <h2>Pedido enviado</h2>
    <button onclick="volver()">Volver</button>
  </div>
</div>

<!-- QR -->
<div id="qrModal" onclick="this.style.display='none'">
  <img id="qrImg">
</div>

<script>

let comboSeleccionado = null;
const URL = window.location.origin;

// AUTO COMPLETAR
window.onload = ()=>{
  nombre.value = localStorage.getItem("nombre")||"";
  telefono.value = localStorage.getItem("telefono")||"";
  direccion.value = localStorage.getItem("direccion")||"";
};

function cargarProductos(){
  fetch("/api/productos")
  .then(r=>r.json())
  .then(data=>{
    producto.innerHTML="";
    data.forEach(p=>{
      let o=document.createElement("option");
      o.value=p.nombre;
      o.textContent=p.nombre;
      producto.appendChild(o);
    });
  });
}

// PROMO SIMPLE
function aplicarPromo(p,c){
  producto.value=p;
  cantidad.value=c;
}

// COMBO
function combo1(){
  comboSeleccionado=[
    {producto:"ASADO FORTUNA",cantidad:"2"},
    {producto:"VACIO",cantidad:"1"}
  ];

  comboBox.style.display="block";
  comboBox.innerHTML="<b>Combo:</b><br>🥩 Asado 2kg<br>🥩 Vacío 1kg";
}

// ENVIAR
function enviar(){
  const n=nombre.value;
  const t=telefono.value;
  const d=direccion.value;

  localStorage.setItem("nombre",n);
  localStorage.setItem("telefono",t);
  localStorage.setItem("direccion",d);

  // combo
  if(comboSeleccionado){
    comboSeleccionado.forEach(item=>{
      fetch("/api/pedidos",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          cliente:{nombre:n,telefono:t,direccion:d},
          producto:item.producto,
          cantidad:item.cantidad
        })
      });
    });

    comboSeleccionado=null;
    comboBox.style.display="none";
  } else {
    fetch("/api/pedidos",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        cliente:{nombre:n,telefono:t,direccion:d},
        producto:producto.value,
        cantidad:cantidad.value
      })
    });
  }

  formulario.style.display="none";
  exito.style.display="flex";
}

// HISTORIAL
function verHistorial(){
  const tel=telefono.value || localStorage.getItem("telefono");
  if(!tel){alert("Ingresá teléfono");return;}

  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    lista.innerHTML="";

    data.filter(p=>p.cliente?.telefono==tel)
    .reverse()
    .forEach(p=>{
      const estado=p.estado||"pendiente";
      const clase=estado==="entregado"?"entregado":"pendiente";

      lista.innerHTML+=`
      <div class="card">
        🥩 ${p.producto}<br>
        ⚖️ ${p.cantidad}<br>
        <div class="estado ${clase}">${estado}</div>
      </div>`;
    });

    formulario.style.display="none";
    historial.style.display="block";
  });
}

// WHATSAPP
function compartir(){
  window.open(`https://wa.me/?text=Hacé tu pedido ${URL}`);
}

// QR
function verQR(){
  qrImg.src=`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${URL}`;
  qrModal.style.display="flex";
}

function volver(){
  historial.style.display="none";
  exito.style.display="none";
  formulario.style.display="block";
}

cargarProductos();

</script>

</body>
</html>
