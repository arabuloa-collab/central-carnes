<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
}

/* 🔥 CONTENEDOR */
.container {
  max-width: 400px;
  margin: 20px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px #000;
}

/* 🔥 SECCIONES */
.section {
  margin-bottom: 20px;
  text-align: left;
}

.section-title {
  font-size: 14px;
  margin-bottom: 5px;
  color: #94a3b8;
}

/* 🔥 INPUTS */
input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #0f172a;
  color: white;
}

/* 🔥 BOTONES */
button {
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.btn-sec {
  background: #334155;
  color: white;
  margin-top: 10px;
}

.card {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
}

.btn-repetir {
  background: #3b82f6;
  color: white;
  margin-top: 8px;
}

/* estados */
.estado {
  padding: 5px;
  border-radius: 6px;
  font-weight: bold;
  display: inline-block;
  margin-top: 5px;
}

.pendiente {
  background: #facc15;
  color: black;
}

.entregado {
  background: #22c55e;
  color: black;
}

/* animación */
.fade-out {
  animation: fadeOut 0.4s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(0.95);
  }
}

#exito {
  display: none;
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0f172a;
  justify-content:center;
  align-items:center;
}

.card-exito {
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
  animation:zoomIn 0.3s;
}

@keyframes zoomIn {
  from {transform:scale(0.6); opacity:0;}
  to {transform:scale(1); opacity:1;}
}

.check {
  font-size:70px;
  color:#22c55e;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" style="height:50px;"><br>
  <b>Central Carnes</b>
</header>

<!-- FORM -->
<div id="formulario" class="container">

<h2>Hacer Pedido</h2>

<div class="section">
  <div class="section-title">Datos del cliente</div>
  <input id="nombre" placeholder="Nombre completo">
  <input id="telefono" placeholder="Teléfono">
  <input id="direccion" placeholder="Dirección de entrega">
</div>

<div class="section">
  <div class="section-title">Detalle del pedido</div>
  <select id="producto"></select>
  <input id="cantidad" placeholder="Cantidad en kg">
</div>

<button onclick="enviar()">Enviar Pedido</button>
<button class="btn-sec" onclick="verHistorial()">Ver mis pedidos</button>

</div>

<!-- EXITO -->
<div id="exito">
  <div class="card-exito">
    <div class="check">✅</div>
    <h2>Pedido enviado</h2>
    <button onclick="volver()">Hacer otro pedido</button>
  </div>
</div>

<!-- HISTORIAL -->
<div id="historial" class="container" style="display:none;">
  <h2>📦 Mis pedidos</h2>
  <div id="lista"></div>
  <button onclick="volver()">Volver</button>
</div>

<script>

// auto completar
window.onload = function() {
  nombre.value = localStorage.getItem("nombre") || "";
  telefono.value = localStorage.getItem("telefono") || "";
  direccion.value = localStorage.getItem("direccion") || "";
};

function cargarProductos() {
  fetch("/api/productos")
  .then(r=>r.json())
  .then(data=>{
    producto.innerHTML="";
    data.forEach(p=>{
      let o=document.createElement("option");
      o.value=p.nombre;
      o.textContent=p.nombre;
      producto.appendChild(o);
    });
  });
}

function enviar(){
  const n=nombre.value;
  const t=telefono.value;
  const d=direccion.value;

  localStorage.setItem("nombre",n);
  localStorage.setItem("telefono",t);
  localStorage.setItem("direccion",d);

  const pedido={
    cliente:{nombre:n,telefono:t,direccion:d},
    producto:producto.value,
    cantidad:cantidad.value
  };

  fetch("/api/pedidos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(pedido)
  })
  .then(()=>{
    formulario.classList.add("fade-out");
    setTimeout(()=>{
      formulario.style.display="none";
      exito.style.display="flex";
    },400);
  });
}

function verHistorial(){
  const tel=telefono.value || localStorage.getItem("telefono");

  if(!tel){alert("Ingresá tu teléfono");return;}

  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    lista.innerHTML="";
    const pedidos=data.filter(p=>p.cliente?.telefono==tel);

    pedidos.reverse().forEach(p=>{
      const estado=p.estado||"pendiente";
      const clase=estado==="entregado"?"entregado":"pendiente";

      lista.innerHTML+=`
      <div class="card">
        🥩 ${p.producto}<br>
        ⚖️ ${p.cantidad}<br>
        📅 ${p.fecha||"-"}<br>
        <div class="estado ${clase}">${estado}</div>
        <button class="btn-repetir" onclick='repetir(${JSON.stringify(p)})'>🔁 Repetir</button>
      </div>`;
    });

    formulario.style.display="none";
    historial.style.display="block";
  });
}

function repetir(p){
  nombre.value=p.cliente?.nombre||"";
  telefono.value=p.cliente?.telefono||"";
  direccion.value=p.cliente?.direccion||"";
  producto.value=p.producto||"";
  cantidad.value=p.cantidad||"";

  historial.style.display="none";
  formulario.style.display="block";
}

function volver(){
  exito.style.display="none";
  historial.style.display="none";
  formulario.style.display="block";
  formulario.classList.remove("fade-out");
}

cargarProductos();

</script>

</body>
</html>
