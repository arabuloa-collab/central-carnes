<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
}

input, select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* 🔥 PANTALLA ÉXITO */
#exito {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #0f172a;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.check {
  font-size: 80px;
  color: #22c55e;
}

.card-exito {
  background: #1e293b;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px #000;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <img src="logo.png" style="height:50px; margin-bottom:5px;">
    <div style="font-weight:bold;">Central Carnes</div>
  </div>
</header>

<!-- FORM -->
<div id="formulario">

<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>

<input id="cantidad" placeholder="Cantidad (kg)">

<button onclick="enviar()">Enviar Pedido</button>

</div>

<!-- 🔥 PANTALLA DE ÉXITO -->
<div id="exito">
  <div class="card-exito">
    <div class="check">✅</div>
    <h2>Pedido enviado</h2>
    <p>Nos vamos a comunicar con vos a la brevedad</p>
    <button onclick="volver()">Hacer otro pedido</button>
  </div>
</div>

<script>
function cargarProductos() {
  fetch("/api/productos")
    .then(r => r.json())
    .then(data => {
      const select = document.getElementById("producto");
      select.innerHTML = "";

      data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.nombre;
        option.textContent = p.nombre;
        select.appendChild(option);
      });
    });
}

function enviar() {
  const pedido = {
    cliente: {
      nombre: document.getElementById("nombre").value,
      telefono: document.getElementById("telefono").value,
      direccion: document.getElementById("direccion").value
    },
    producto: document.getElementById("producto").value,
    cantidad: document.getElementById("cantidad").value
  };

  fetch("/api/pedidos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(pedido)
  })
  .then(() => {

    // limpiar
    document.getElementById("nombre").value = "";
    document.getElementById("telefono").value = "";
    document.getElementById("direccion").value = "";
    document.getElementById("cantidad").value = "";

    // mostrar pantalla pro
    document.getElementById("formulario").style.display = "none";
    document.getElementById("exito").style.display = "flex";
  });
}

function volver() {
  document.getElementById("exito").style.display = "none";
  document.getElementById("formulario").style.display = "block";
}

cargarProductos();
</script>

</body>
</html>
