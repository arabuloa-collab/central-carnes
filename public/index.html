<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 400px;
  margin: 20px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px #000;
}

.section {
  margin-bottom: 20px;
}

.section-title {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #0f172a;
  color: white;
}

button {
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 5px;
}

.btn-main { background: #22c55e; color: black; }
.btn-sec { background: #334155; color: white; }
.btn-wsp { background: #25D366; color: black; }
.btn-qr { background: #3b82f6; color: white; }

.estado {
  padding: 5px;
  border-radius: 6px;
  font-weight: bold;
  display: inline-block;
  margin-top: 5px;
}

.pendiente { background: #facc15; color: black; }
.entregado { background: #22c55e; color: black; }

.card {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
}

.btn-repetir {
  background: #3b82f6;
  color: white;
}

/* MODAL QR */
#qrModal {
  display: none;
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#qrModal img {
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" style="height:50px;"><br>
  <b>Central Carnes</b>
</header>

<div id="formulario" class="container">

<h2>Hacer Pedido</h2>

<div class="section">
  <div class="section-title">Datos</div>
  <input id="nombre" placeholder="Nombre">
  <input id="telefono" placeholder="Teléfono">
  <input id="direccion" placeholder="Dirección">
</div>

<div class="section">
  <div class="section-title">Pedido</div>
  <select id="producto"></select>
  <input id="cantidad" placeholder="Cantidad (kg)">
</div>

<button class="btn-main" onclick="enviar()">Enviar Pedido</button>
<button class="btn-sec" onclick="verHistorial()">Ver mis pedidos</button>

<!-- 🔥 NUEVO -->
<button class="btn-wsp" onclick="compartir()">Compartir por WhatsApp</button>
<button class="btn-qr" onclick="verQR()">Ver QR del negocio</button>

</div>

<div id="historial" class="container" style="display:none;">
  <h2>📦 Mis pedidos</h2>
  <div id="lista"></div>
  <button onclick="volver()">Volver</button>
</div>

<!-- 🔥 QR MODAL -->
<div id="qrModal" onclick="cerrarQR()">
  <img id="qrImg">
</div>

<script>

const URL = window.location.origin;

// auto completar
window.onload = () => {
  nombre.value = localStorage.getItem("nombre") || "";
  telefono.value = localStorage.getItem("telefono") || "";
  direccion.value = localStorage.getItem("direccion") || "";
};

function cargarProductos(){
  fetch("/api/productos")
  .then(r=>r.json())
  .then(data=>{
    producto.innerHTML="";
    data.forEach(p=>{
      let o=document.createElement("option");
      o.value=p.nombre;
      o.textContent=p.nombre;
      producto.appendChild(o);
    });
  });
}

function enviar(){
  const n=nombre.value;
  const t=telefono.value;
  const d=direccion.value;

  localStorage.setItem("nombre",n);
  localStorage.setItem("telefono",t);
  localStorage.setItem("direccion",d);

  fetch("/api/pedidos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:{nombre:n,telefono:t,direccion:d},
      producto:producto.value,
      cantidad:cantidad.value
    })
  })
  .then(()=>alert("Pedido enviado"));
}

// 🔥 COMPARTIR WHATSAPP
function compartir(){
  const msg = "Hacé tu pedido acá 👉 " + URL;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

// 🔥 QR
function verQR(){
  const qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${URL}`;
  qrImg.src = qrURL;
  qrModal.style.display = "flex";
}

function cerrarQR(){
  qrModal.style.display = "none";
}

function verHistorial(){
  const tel=telefono.value || localStorage.getItem("telefono");
  if(!tel){alert("Ingresá tu teléfono");return;}

  fetch("/api/pedidos")
  .then(r=>r.json())
  .then(data=>{
    lista.innerHTML="";
    const pedidos=data.filter(p=>p.cliente?.telefono==tel);

    pedidos.reverse().forEach(p=>{
      const estado=p.estado||"pendiente";
      const clase=estado==="entregado"?"entregado":"pendiente";

      lista.innerHTML+=`
      <div class="card">
        🥩 ${p.producto}<br>
        ⚖️ ${p.cantidad}<br>
        📅 ${p.fecha||"-"}<br>
        <div class="estado ${clase}">${estado}</div>
        <button class="btn-repetir" onclick='repetir(${JSON.stringify(p)})'>🔁 Repetir</button>
      </div>`;
    });

    formulario.style.display="none";
    historial.style.display="block";
  });
}

function repetir(p){
  nombre.value=p.cliente?.nombre||"";
  telefono.value=p.cliente?.telefono||"";
  direccion.value=p.cliente?.direccion||"";
  producto.value=p.producto||"";
  cantidad.value=p.cantidad||"";

  historial.style.display="none";
  formulario.style.display="block";
}

function volver(){
  historial.style.display="none";
  formulario.style.display="block";
}

cargarProductos();

</script>

</body>
</html>
