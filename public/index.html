<style>
*{box-sizing:border-box;}

body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  background:#dc2626;
  padding:15px;
  text-align:center;
}

header img{height:50px;}

.container{
  max-width:900px;
  margin:20px auto;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
}

.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.field{display:flex;flex-direction:column;}
.field.full{grid-column:1/-1;}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#0f172a;
  color:white;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.btn-main{background:#22c55e;color:black;}
.btn-sec{background:#334155;color:white;}
.btn-add{background:#facc15;color:black;}
.btn-clear{background:#475569;color:white;}

.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:15px;
}

#comboBox{
  display:none;
  background:#020617;
  padding:10px;
  border-radius:10px;
}

/* carrito SIN romper estética */
#carritoBox{
  background:#020617;
  padding:10px;
  border-radius:10px;
}

.carrito-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<br>
<b>Central Carnes</b>
</header>

<div class="container">

<div class="form-grid">

<div class="field">
<label>Nombre</label>
<input id="nombre">
</div>

<div class="field">
<label>Teléfono</label>
<input id="telefono">
</div>

<div class="field full">
<label>Dirección</label>
<input id="direccion">
</div>

<div class="field">
<label>Producto</label>
<select id="producto"></select>
</div>

<div class="field">
<label>Cantidad</label>
<input id="cantidad">
</div>

<div class="field full">
<label>Combo seleccionado</label>
<div id="comboBox"></div>
</div>

<!-- 🔥 CARRITO BIEN INTEGRADO -->
<div class="field full">
<label>Carrito</label>

<div id="carritoBox">

<div id="carritoLista">
No hay productos
</div>

<div class="actions">
<button class="btn-add" onclick="agregarAlCarrito()">Agregar</button>
<button class="btn-clear" onclick="vaciarCarrito()">Vaciar</button>
</div>

</div>

</div>

</div>

<div class="actions">
<button class="btn-main" onclick="enviar()">Enviar</button>
<button class="btn-sec" onclick="verHistorial()">Historial</button>
</div>

</div>

<script>

let carrito=[];
let comboSeleccionado=null;

window.onload=()=>{
nombre.value=localStorage.getItem("nombre")||"";
telefono.value=localStorage.getItem("telefono")||"";
direccion.value=localStorage.getItem("direccion")||"";
};

function cargarProductos(){
fetch("/api/productos")
.then(r=>r.json())
.then(data=>{
producto.innerHTML="";
data.forEach(p=>{
let o=document.createElement("option");
o.value=p.nombre;
o.textContent=p.nombre;
producto.appendChild(o);
});
});
}

function agregarAlCarrito(){

if(comboSeleccionado){
comboSeleccionado.forEach(i=>carrito.push(i));
comboSeleccionado=null;
comboBox.style.display="none";
}else{

if(!producto.value||!cantidad.value){
alert("Seleccioná producto y cantidad");
return;
}

carrito.push({
producto:producto.value,
cantidad:cantidad.value
});
}

cantidad.value="";
renderCarrito();
}

function renderCarrito(){

if(carrito.length==0){
carritoLista.innerHTML="No hay productos";
return;
}

carritoLista.innerHTML="";

carrito.forEach((i,x)=>{
carritoLista.innerHTML+=`
<div class="carrito-item">
<span>${i.producto} - ${i.cantidad}kg</span>
<button onclick="carrito.splice(${x},1);renderCarrito()">X</button>
</div>`;
});
}

function vaciarCarrito(){
carrito=[];
renderCarrito();
}

function enviar(){

const n=nombre.value;
const t=telefono.value;
const d=direccion.value;

mensaje+=`${i.producto} ${i.cantidad}kg\n`;
});

window.open(`https://wa.me/5491125061324?text=${encodeURIComponent(mensaje)}`);

}

function verHistorial(){
alert("historial activo");
}

cargarProductos();

</script>

</body>
</html>
