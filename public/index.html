<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
  text-align: center;
}

/* 🔥 PROMOS */
.promos {
  padding: 10px;
}

.promo-card {
  background: #dc2626;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.promo-card:hover {
  transform: scale(1.05);
}

/* CONTENEDOR */
.container {
  max-width: 400px;
  margin: 20px auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 15px #000;
}

.section {
  margin-bottom: 20px;
}

.section-title {
  font-size: 14px;
  color: #94a3b8;
  margin-bottom: 5px;
}

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  background: #0f172a;
  color: white;
}

button {
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 5px;
}

.btn-main { background: #22c55e; color: black; }
.btn-sec { background: #334155; color: white; }
.btn-wsp { background: #25D366; color: black; }
.btn-qr { background: #3b82f6; color: white; }

</style>
</head>

<body>

<header>
  <img src="logo.png" style="height:50px;"><br>
  <b>Central Carnes</b>
</header>

<!-- 🔥 PROMOS CLICK -->
<div class="promos">

  <div class="promo-card" onclick="aplicarPromo('ASADO FORTUNA', '2')">
    🔥 2kg Asado Fortuna
  </div>

  <div class="promo-card" onclick="aplicarPromo('VACIO', '1')">
    💥 1kg Vacío Oferta
  </div>

  <div class="promo-card" onclick="aplicarPromo('BIFE DE CHORIZO', '3')">
    🥩 Promo Bife x3kg
  </div>

</div>

<!-- FORM -->
<div class="container">

<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>

<input id="cantidad" placeholder="Cantidad (kg)">

<button class="btn-main" onclick="enviar()">Enviar Pedido</button>
<button class="btn-sec" onclick="verHistorial()">Ver mis pedidos</button>

</div>

<script>

// 🔥 AUTO COMPLETAR
window.onload = () => {
  nombre.value = localStorage.getItem("nombre") || "";
  telefono.value = localStorage.getItem("telefono") || "";
  direccion.value = localStorage.getItem("direccion") || "";
};

function cargarProductos(){
  fetch("/api/productos")
  .then(r=>r.json())
  .then(data=>{
    producto.innerHTML="";
    data.forEach(p=>{
      let o=document.createElement("option");
      o.value=p.nombre;
      o.textContent=p.nombre;
      producto.appendChild(o);
    });
  });
}

// 🔥 APLICAR PROMO
function aplicarPromo(prod, cant){
  producto.value = prod;
  cantidad.value = cant;

  // scroll al formulario
  window.scrollTo({ top: 300, behavior: "smooth" });
}

function enviar(){
  const n=nombre.value;
  const t=telefono.value;
  const d=direccion.value;

  localStorage.setItem("nombre",n);
  localStorage.setItem("telefono",t);
  localStorage.setItem("direccion",d);

  fetch("/api/pedidos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      cliente:{nombre:n,telefono:t,direccion:d},
      producto:producto.value,
      cantidad:cantidad.value
    })
  })
  .then(()=>alert("Pedido enviado"));
}

cargarProductos();

</script>

</body>
</html>
