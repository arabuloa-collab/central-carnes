<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Central de Carnes</title>
</head>
<body style="background:#111;color:white;text-align:center;font-family:Arial;">

<h1 style="color:red;">Central de Carnes</h1>

<form id="pedidoForm">
  <h3>Datos del Cliente</h3>

  <input type="text" id="nombre" placeholder="Nombre" required><br>
  <input type="text" id="telefono" placeholder="Teléfono" required><br>
  <input type="text" id="direccion" placeholder="Dirección" required><br>

  <h3>Pedido</h3>

  <select id="producto"></select><br>

  <input type="number" id="cantidad" placeholder="Cantidad" required><br>

  <button type="submit">Enviar Pedido</button>
</form>

<script>
fetch("/api/productos")
  .then(res => res.json())
  .then(data => {
    const select = document.getElementById("producto");
    data.forEach(p => {
      const option = document.createElement("option");
      option.value = p.nombre;
      option.textContent = p.nombre;
      select.appendChild(option);
    });
  });

document.getElementById("pedidoForm").addEventListener("submit", e => {
  e.preventDefault();

  const pedido = {
    cliente: {
      nombre: document.getElementById("nombre").value,
      telefono: document.getElementById("telefono").value,
      direccion: document.getElementById("direccion").value
    },
    producto: document.getElementById("producto").value,
    cantidad: document.getElementById("cantidad").value
  };

  fetch("/api/pedidos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(pedido)
  })
  .then(() => {
    alert("Pedido enviado");
    location.reload();
  });
});
</script>

</body>
</html>
