<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
}

input, select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.card {
  background: #1e293b;
  margin: 10px auto;
  padding: 15px;
  border-radius: 10px;
  width: 260px;
}

.btn-repetir {
  background: #3b82f6;
  color: white;
  margin-top: 8px;
}
</style>
</head>

<body>

<header>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <img src="logo.png" style="height:50px;">
    <div><b>Central Carnes</b></div>
  </div>
</header>

<!-- FORM -->
<div id="formulario">
<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>

<input id="cantidad" placeholder="Cantidad (kg)">

<button onclick="enviar()">Enviar Pedido</button>
<button onclick="verHistorial()">Ver mis pedidos</button>
</div>

<!-- EXITO -->
<div id="exito" style="display:none;">
  <h2>✅ Pedido enviado</h2>
  <button onclick="volver()">Volver</button>
</div>

<!-- HISTORIAL -->
<div id="historial" style="display:none;">
  <h2>📦 Mis pedidos</h2>
  <div id="lista"></div>
  <button onclick="volver()">Volver</button>
</div>

<script>
function cargarProductos() {
  fetch("/api/productos")
    .then(r => r.json())
    .then(data => {
      const select = document.getElementById("producto");
      select.innerHTML = "";

      data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.nombre;
        option.textContent = p.nombre;
        select.appendChild(option);
      });
    });
}

function enviar() {
  const telefono = document.getElementById("telefono").value;

  const pedido = {
    cliente: {
      nombre: document.getElementById("nombre").value,
      telefono: telefono,
      direccion: document.getElementById("direccion").value
    },
    producto: document.getElementById("producto").value,
    cantidad: document.getElementById("cantidad").value
  };

  fetch("/api/pedidos", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(pedido)
  })
  .then(() => {
    localStorage.setItem("telefono", telefono);

    document.getElementById("formulario").style.display = "none";
    document.getElementById("exito").style.display = "block";
  });
}

function verHistorial() {
  const tel = document.getElementById("telefono").value || localStorage.getItem("telefono");

  if (!tel) {
    alert("Ingresá tu teléfono");
    return;
  }

  fetch("/api/pedidos")
  .then(r => r.json())
  .then(data => {

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    const pedidos = data.filter(p => p.cliente?.telefono == tel);

    pedidos.reverse().forEach(p => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        🥩 ${p.producto}<br>
        ⚖️ ${p.cantidad}<br>
        📅 ${p.fecha || "-"}<br>
        📦 ${p.estado || "pendiente"}<br>

        <button class="btn-repetir" onclick='repetir(${JSON.stringify(p)})'>
          🔁 Repetir pedido
        </button>
      `;

      lista.appendChild(div);
    });

    document.getElementById("formulario").style.display = "none";
    document.getElementById("historial").style.display = "block";
  });
}

function repetir(p) {
  // completar formulario
  document.getElementById("nombre").value = p.cliente?.nombre || "";
  document.getElementById("telefono").value = p.cliente?.telefono || "";
  document.getElementById("direccion").value = p.cliente?.direccion || "";
  document.getElementById("producto").value = p.producto || "";
  document.getElementById("cantidad").value = p.cantidad || "";

  // volver al form
  document.getElementById("historial").style.display = "none";
  document.getElementById("formulario").style.display = "block";
}

function volver() {
  document.getElementById("exito").style.display = "none";
  document.getElementById("historial").style.display = "none";
  document.getElementById("formulario").style.display = "block";
}

cargarProductos();
</script>

</body>
</html>
