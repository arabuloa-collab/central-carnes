<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pedidos</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  margin: 0;
}

header {
  background: linear-gradient(90deg, #dc2626, #ef4444);
  padding: 15px;
}

input, select {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 250px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px;
  width: 250px;
  border: none;
  border-radius: 8px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}
</style>
</head>

<body>

<!-- 🔥 HEADER CON LOGO -->
<header>
  <div style="display:flex; flex-direction:column; align-items:center;">
    <img src="logo.png" style="height:50px; margin-bottom:5px;">
    <div style="font-weight:bold;">Central Carnes</div>
  </div>
</header>

<h2>Hacer Pedido</h2>

<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">

<select id="producto"></select>

<input id="cantidad" placeholder="Cantidad (kg)">

<button onclick="enviar()">Enviar Pedido</button>

<script>
function cargarProductos() {
  fetch("/api/productos")
    .then(r => r.json())
    .then(data => {
      const select = document.getElementById("producto");
      select.innerHTML = "";

      data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.nombre;
        option.textContent = p.nombre;
        select.appendChild(option);
      });
    });
}

function enviar() {
  const pedido = {
    cliente: {
      nombre: document.getElementById("nombre").value,
      telefono: document.getElementById("telefono").value,
      direccion: document.getElementById("direccion").value
    },
    producto: document.getElementById("producto").value,
    cantidad: document.getElementById("cantidad").value
  };

  fetch("/api/pedidos", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(pedido)
  })
  .then(() => {
    alert("Pedido enviado");
    document.getElementById("nombre").value = "";
    document.getElementById("telefono").value = "";
    document.getElementById("direccion").value = "";
    document.getElementById("cantidad").value = "";
  });
}

cargarProductos();
</script>

</body>
</html>
